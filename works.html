    const years = Object.keys(worksData).sort((a, b) => Number(b) - Number(a));
    const defaultYear = years[0];

    const yearNav = document.getElementById("yearNav");
    const worksList = document.getElementById("worksList");

    let currentYear = defaultYear;

    function renderYearTabs(activeYear) {
      yearNav.innerHTML = "";

      years.forEach((year) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = year === activeYear ? "year-link is-active" : "year-link";
        button.textContent = year;
        button.setAttribute("aria-pressed", year === activeYear ? "true" : "false");

        button.addEventListener("click", () => {
          currentYear = year;
          renderYearTabs(currentYear);
          renderWorks(currentYear);
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        yearNav.appendChild(button);
      });
    }

    function getYouTubeEmbedUrl(url) {
      if (!url) return "";

      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtu\.be\/)([\w-]{11})/,
        /^([\w-]{11})$/,
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match) {
          return `https://www.youtube.com/embed/${match[1]}`;
        }
      }

      return "";
    }

    function renderWorks(year) {
        worksList.innerHTML = "";
        const currentWorks = worksData[year];

        currentWorks.forEach((item) => {
            const figure = document.createElement("figure");
            figure.className = "work-item";

            let media;

            if (item.type === "video") {
            const embedUrl = getYouTubeEmbedUrl(item.src);

            if (embedUrl) {
              const wrapper = document.createElement("div");
              wrapper.className = "work-item__video";

              media = document.createElement("iframe");
              media.src = embedUrl;
              media.title = item.title;
              media.allow =
                "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
              media.allowFullscreen = true;
              media.loading = "lazy";

              wrapper.appendChild(media);
              media = wrapper;
            } else {
              media = document.createElement("a");
              media.className = "work-item__video-link";
              media.href = item.src;
              media.target = "_blank";
              media.rel = "noopener noreferrer";
              media.textContent = "YouTubeで見る";
            }
            } else {
            media = document.createElement("img");
            media.src = item.src;
            media.alt = item.title;
            }

            const caption = document.createElement("figcaption");
            caption.textContent = item.title;

            figure.appendChild(media);
            figure.appendChild(caption);
            worksList.appendChild(figure);
        });
    }

    renderYearTabs(currentYear);
    renderWorks(currentYear);
